<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM RECAP ARCHIVE — PRESENCE</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<style>
  :root{
    --ink:#0a0a0c; --amber:#e8b466; --amber-dim:#9a7a44; --green:#38a37a;
    --cream:#efe7d6; --smoke:#6f6a60; --line:#2a2722; --film:#16140f; --sprocket:#0c0b08;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--cream);font-family:"Times New Roman","Nanum Myeongjo",serif;
    -webkit-font-smoothing:antialiased;word-break:keep-all;min-height:100vh}
  .mono{font-family:"Courier New",ui-monospace,monospace}
  .wrap{max-width:1080px;margin:0 auto;padding:48px 24px 80px}

  .hub{position:fixed;top:18px;right:18px;z-index:50;text-decoration:none;
    font-family:"Courier New",monospace;font-size:10.5px;letter-spacing:.22em;color:var(--smoke);
    border:1px solid var(--line);border-radius:2px;padding:8px 14px;background:rgba(10,10,12,.7);transition:.25s}
  .hub:hover{color:var(--amber);border-color:var(--amber-dim)}

  .kicker{font-family:"Courier New",monospace;font-size:10px;letter-spacing:.5em;color:var(--amber);text-indent:.5em}
  h1{font-weight:400;font-size:clamp(26px,4vw,40px);margin:.4em 0 .2em;color:var(--cream)}
  h1 em{font-style:italic;color:var(--amber)}
  .sub{font-family:"Courier New",monospace;font-size:10.5px;letter-spacing:.28em;color:var(--smoke)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-top:38px}
  .card{position:relative;border:1px solid var(--line);border-radius:4px;background:rgba(22,20,15,.85);
    padding:22px 22px 18px;cursor:pointer;transition:.3s;text-decoration:none;display:block;color:inherit}
  .card:hover{border-color:var(--amber-dim);transform:translateY(-3px);
    box-shadow:0 14px 40px rgba(0,0,0,.6),0 0 30px rgba(232,180,102,.12)}
  .card .tag{font-family:"Courier New",monospace;font-size:9px;letter-spacing:.3em;color:var(--green)}
  .card .name{font-size:19px;color:var(--cream);margin:.4em 0 .3em;line-height:1.35}
  .card .meta{font-size:11.5px;color:var(--smoke);font-family:"Courier New",monospace;letter-spacing:.08em}
  .card .go{position:absolute;top:16px;right:16px;color:var(--amber-dim);font-size:14px;transition:.3s}
  .card:hover .go{color:var(--amber);transform:translateX(3px)}

  .state{margin-top:40px;color:var(--smoke);font-size:14px;line-height:2;border:1px dashed var(--line);
    border-radius:4px;padding:26px;text-align:center}
  .state a{color:var(--amber);text-decoration:none}
  .state .mono{font-size:11px;letter-spacing:.1em}

  /* viewer */
  #viewer{display:none}
  #viewer.on{display:block}
  #list.off{display:none}
  .vhead{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .back{background:none;border:1px solid var(--line);color:var(--smoke);font-family:"Courier New",monospace;
    font-size:10.5px;letter-spacing:.22em;padding:8px 14px;border-radius:2px;cursor:pointer;transition:.25s}
  .back:hover{color:var(--amber);border-color:var(--amber-dim)}
  .vtitle{font-size:clamp(20px,3vw,30px)}
  .vprog{font-family:"Courier New",monospace;font-size:10px;letter-spacing:.2em;color:var(--smoke);margin-left:auto}
  .dl{font-family:"Courier New",monospace;font-size:10px;letter-spacing:.2em;color:var(--green);text-decoration:none;
    border:1px solid rgba(56,163,122,.35);border-radius:3px;padding:6px 10px}
  .dl:hover{color:#fff}

  .slides{display:flex;flex-direction:column;gap:26px;margin-top:26px;align-items:center}
  .frame{position:relative;background:var(--film);border-radius:3px;padding:20px 10px;width:100%;max-width:940px;
    box-shadow:0 12px 36px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.03)}
  .frame::before,.frame::after{content:"";position:absolute;left:8px;right:8px;height:10px;z-index:2;
    background-image:radial-gradient(circle,var(--sprocket) 0 38%,transparent 41%);
    background-size:16px 10px;background-position:center;opacity:.95}
  .frame::before{top:5px}.frame::after{bottom:5px}
  .frame canvas{display:block;width:100%;height:auto;border-radius:1px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.5)}
  .fcap{position:absolute;bottom:7px;left:14px;z-index:3;font-family:"Courier New",monospace;font-size:8.5px;
    letter-spacing:.18em;color:var(--amber);text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.9)}

  footer{margin-top:70px;text-align:center;font-family:"Courier New",monospace;font-size:10px;
    letter-spacing:.3em;color:var(--smoke);line-height:2.2}
  footer a{color:var(--amber-dim);text-decoration:none}
  footer a:hover{color:var(--amber)}
</style>
</head>
<body>
<a class="hub" href="index.html">← HUB</a>

<div class="wrap">
  <div class="kicker">PRESENCE · TEAM RECAP ARCHIVE</div>
  <h1>Team Recaps, <em>month by month</em></h1>
  <div class="sub">리캡 폴더에 PDF를 올리면 이곳에 자동으로 나타납니다</div>

  <div id="list">
    <div class="grid" id="cards"></div>
    <div class="state" id="state" style="display:none"></div>
    <footer>
      리캡 추가 방법 — <a href="https://github.com/jaeyoung5178-bot/Presence/upload/main/%EB%A6%AC%EC%BA%A1" target="_blank" rel="noopener">GitHub 리캡 폴더에 업로드</a> → 몇 분 후 자동 반영<br>
      PDF 권장 · PPT/PPTX는 카드에서 웹 뷰어로 열립니다 · 파일명 예시: <span class="mono">2026-05 오월의 팀.pdf</span>
    </footer>
  </div>

  <div id="viewer">
    <div class="vhead">
      <button class="back" id="backBtn">← ARCHIVE</button>
      <div class="vtitle" id="vtitle"></div>
      <span class="vprog" id="vprog"></span>
      <a class="dl" id="vdl" href="#" download>DOWNLOAD ↓</a>
    </div>
    <div class="slides" id="slides"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const REPO = 'jaeyoung5178-bot/Presence';
const FOLDER = '리캡';
const cards = document.getElementById('cards');
const state = document.getElementById('state');

/* 고정 카드: 기존 HTML 리캡 */
const BUILTIN = [
  {name: '2026.04 — how the team ran', href: '토픽/recap-2026-04.html', tag: 'RECAP · HTML', meta: 'APRIL 2026 · PRESENCE TEAM'}
];

function fileCard(f){
  const ext = f.name.split('.').pop().toLowerCase();
  const title = f.name.replace(/\.[^.]+$/, '');
  const size = f.size > 1048576 ? (f.size/1048576).toFixed(1)+' MB' : Math.round(f.size/1024)+' KB';
  if (ext === 'pdf') {
    return `<div class="card" onclick="openPdf('${encodeURI(f.download_url||FOLDER+'/'+f.name)}','${title.replace(/'/g,"\\'")}')">
      <span class="go">▶</span><div class="tag">RECAP · PDF</div>
      <div class="name">${title}</div><div class="meta">${size} · 클릭하면 슬라이드로 펼쳐집니다</div></div>`;
  }
  if (ext === 'pptx' || ext === 'ppt') {
    const raw = 'https://jaeyoung5178-bot.github.io/Presence/' + encodeURI(FOLDER + '/' + f.name);
    const office = 'https://view.officeapps.live.com/op/view.aspx?src=' + encodeURIComponent(raw);
    return `<a class="card" href="${office}" target="_blank" rel="noopener">
      <span class="go">↗</span><div class="tag">RECAP · ${ext.toUpperCase()}</div>
      <div class="name">${title}</div><div class="meta">${size} · 웹 뷰어로 열기 (PDF 업로드 권장)</div></a>`;
  }
  return '';
}

async function loadList(){
  cards.innerHTML = BUILTIN.map(b=>`<a class="card" href="${b.href}"><span class="go">→</span>
    <div class="tag">${b.tag}</div><div class="name">${b.name}</div><div class="meta">${b.meta}</div></a>`).join('');
  try{
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(FOLDER)}?t=${Date.now()}`);
    if(!r.ok) throw new Error(r.status);
    const items = (await r.json()).filter(f=>f.type==='file' && /\.(pdf|pptx?|PDF|PPTX?)$/.test(f.name))
      .sort((a,b)=>b.name.localeCompare(a.name));
    if(items.length){ cards.innerHTML += items.map(fileCard).join(''); }
    else { state.style.display='block';
      state.innerHTML = '아직 올라온 리캡 파일이 없습니다.<br><span class="mono">리캡 폴더에 PDF를 업로드하면 자동으로 이곳에 나타납니다.</span>'; }
  }catch(e){
    state.style.display='block';
    state.innerHTML = '목록을 불러오지 못했습니다. 잠시 후 새로고침 해주세요.<br><span class="mono">'+e+'</span>';
  }
}

/* PDF → 필름 프레임 슬라이드 */
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const viewer = document.getElementById('viewer'), list = document.getElementById('list');
const slides = document.getElementById('slides'), vprog = document.getElementById('vprog');

window.openPdf = async (url, title) => {
  list.classList.add('off'); viewer.classList.add('on');
  document.getElementById('vtitle').textContent = title;
  const dl = document.getElementById('vdl'); dl.href = url;
  slides.innerHTML = ''; vprog.textContent = 'LOADING…';
  window.scrollTo({top:0});
  try{
    const pdf = await pdfjsLib.getDocument(url).promise;
    vprog.textContent = `${pdf.numPages} FRAMES`;
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const vp = page.getViewport({scale: 1});
      const scale = Math.min(2, 1800 / vp.width);
      const v2 = page.getViewport({scale});
      const cv = document.createElement('canvas');
      cv.width = v2.width; cv.height = v2.height;
      await page.render({canvasContext: cv.getContext('2d'), viewport: v2}).promise;
      const fr = document.createElement('div'); fr.className = 'frame';
      fr.appendChild(cv);
      const cap = document.createElement('div'); cap.className = 'fcap';
      cap.textContent = `${String(p).padStart(2,'0')} / ${String(pdf.numPages).padStart(2,'0')} — ${title}`;
      fr.appendChild(cap);
      slides.appendChild(fr);
    }
  }catch(e){
    slides.innerHTML = '<div class="state" style="display:block">PDF를 불러오지 못했습니다.<br><span class="mono">'+e+'</span></div>';
  }
};
document.getElementById('backBtn').onclick = () => {
  viewer.classList.remove('on'); list.classList.remove('off'); slides.innerHTML='';
};
loadList();
</script>

<!-- PRESENCE THEME TOGGLE -->
<style id="pth-style">
html.pth-light{filter:invert(1) hue-rotate(180deg);background:#efe9db}
html.pth-light img,html.pth-light video,html.pth-light iframe,html.pth-light canvas{filter:invert(1) hue-rotate(180deg)}
#pth-btn{position:fixed;right:18px;bottom:18px;z-index:99999;width:46px;height:46px;border-radius:50%;border:1px solid rgba(150,140,120,.5);cursor:pointer;font-size:19px;line-height:1;background:rgba(22,20,15,.85);color:#efe7d6;box-shadow:0 4px 18px rgba(0,0,0,.4);transition:.25s}
#pth-btn:hover{transform:scale(1.1)}
html.pth-light #pth-btn{filter:invert(1) hue-rotate(180deg)}
</style>
<button id="pth-btn" title="라이트 / 나이트 모드" aria-label="테마 전환">☀</button>
<script>
(function(){var K="presence_theme",b=document.getElementById("pth-btn"),h=document.documentElement;
function ap(t){h.classList.toggle("pth-light",t==="light");b.textContent=t==="light"?"☾":"☀";}
var t="night";try{t=localStorage.getItem(K)||"night"}catch(e){}ap(t);
b.addEventListener("click",function(){t=(t==="light")?"night":"light";try{localStorage.setItem(K,t)}catch(e){}ap(t);});})();
</script>
</body>
</html>
