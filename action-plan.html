<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRESENCE — ACTION PLAN</title>
<meta name="theme-color" content="#0f131b">
<style>
  :root{
    --ink:#0a0a0c;
    --amber:#e8b466;
    --amber-dim:#9a7a44;
    --green:#38a37a;
    --cream:#efe7d6;
    --smoke:#6f6a60;
    --line:#2a2722;
    --film:#16140f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--cream); min-height:100vh;
    font-family:"Times New Roman","Nanum Myeongjo",serif;
    -webkit-font-smoothing:antialiased; word-break:keep-all;
    padding:clamp(18px,3vh,34px) clamp(16px,4vw,52px) 60px;
  }
  .mono{font-family:"Courier New",ui-monospace,monospace;}
  .vignette{position:fixed; inset:0; pointer-events:none; z-index:40;
    background:radial-gradient(120% 95% at 50% 50%, transparent 44%, rgba(0,0,0,.5) 80%, rgba(0,0,0,.92) 100%);}
  .wrap{max-width:760px; margin:0 auto; position:relative; z-index:10;}

  header{margin-bottom:clamp(20px,3.5vh,32px);}
  .back{display:inline-block; text-decoration:none; color:var(--smoke);
    font-family:"Courier New",monospace; font-size:10px; letter-spacing:.25em;
    border:1px solid var(--line); padding:7px 13px; border-radius:2px; transition:.25s; margin-bottom:18px;}
  .back:hover{color:var(--amber); border-color:var(--amber-dim);}
  .kicker{font-family:"Courier New",monospace; font-size:10px; letter-spacing:.5em; color:var(--amber); text-indent:.5em;}
  h1{font-weight:400; font-size:clamp(24px,4vw,34px); margin-top:.35em; color:var(--cream);
    text-shadow:0 0 30px rgba(232,180,102,.12);}
  h1 em{font-style:italic; color:var(--amber);}
  .sub{margin-top:.6em; font-size:12.5px; color:var(--smoke); font-style:italic;}

  .progress{border:1px solid var(--line); background:rgba(22,20,15,.75); border-radius:4px;
    padding:16px 18px; margin-bottom:16px;}
  .p-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .p-label{font-family:"Courier New",monospace; font-size:9.5px; letter-spacing:.32em; color:var(--amber-dim);}
  .p-num{font-family:"Courier New",monospace; font-size:12px; letter-spacing:.15em; color:var(--amber);}
  .bar{height:6px; background:#111009; border:1px solid var(--line); border-radius:3px; overflow:hidden;}
  .bar-fill{height:100%; width:0%; border-radius:3px; transition:width .4s ease;
    background:linear-gradient(90deg, var(--amber-dim), var(--amber));
    box-shadow:0 0 12px rgba(232,180,102,.4);}

  .add{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .add input[type=text]{flex:1 1 220px; background:rgba(22,20,15,.85); border:1px solid var(--line);
    color:var(--cream); border-radius:3px; padding:11px 13px; font-size:14px;
    font-family:"Times New Roman","Nanum Myeongjo",serif; outline:none; transition:.25s;}
  .add input[type=text]:focus{border-color:var(--amber-dim); box-shadow:0 0 14px rgba(232,180,102,.12);}
  .add input::placeholder{color:var(--smoke);}
  .add select{background:rgba(22,20,15,.85); border:1px solid var(--line); color:var(--cream);
    border-radius:3px; padding:11px 8px; font-size:12.5px; outline:none;
    font-family:"Courier New",monospace;}
  .add button{background:none; border:1px solid var(--amber-dim); color:var(--amber);
    font-family:"Courier New",monospace; font-size:11px; letter-spacing:.25em;
    padding:11px 18px; border-radius:3px; cursor:pointer; transition:.25s;}
  .add button:hover{color:#fff; border-color:var(--green); box-shadow:0 0 16px rgba(56,163,122,.3);}

  .tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px;}
  .tab{background:none; border:1px solid var(--line); color:var(--smoke); cursor:pointer;
    font-family:"Courier New",monospace; font-size:9.5px; letter-spacing:.2em;
    padding:6px 12px; border-radius:20px; transition:.25s;}
  .tab:hover{color:var(--amber);}
  .tab.active{color:var(--ink); background:var(--amber); border-color:var(--amber);}

  .list{display:flex; flex-direction:column; gap:9px;}
  .item{display:flex; align-items:flex-start; gap:13px;
    background:var(--film); border:1px solid var(--line); border-radius:3px;
    padding:14px 15px; transition:.3s; position:relative;}
  .item:hover{border-color:var(--amber-dim); box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 24px rgba(232,180,102,.08);}
  .item.done{opacity:.45;}
  .item.done .text{text-decoration:line-through; text-decoration-color:var(--amber-dim);}
  .chk{width:21px; height:21px; flex:0 0 auto; margin-top:1px; cursor:pointer;
    background:none; border:1px solid var(--amber-dim); border-radius:2px;
    color:var(--green); font-size:13px; line-height:1; display:flex; align-items:center; justify-content:center;
    transition:.25s;}
  .chk:hover{border-color:var(--green); box-shadow:0 0 10px rgba(56,163,122,.35);}
  .item.done .chk{background:rgba(56,163,122,.15); border-color:var(--green);}
  .body{flex:1; min-width:0;}
  .text{font-size:14.5px; line-height:1.55; color:var(--cream);}
  .meta{display:flex; align-items:center; gap:10px; margin-top:7px;}
  .badge{font-family:"Courier New",monospace; font-size:8px; letter-spacing:.22em;
    color:var(--green); border:1px solid rgba(56,163,122,.35); border-radius:3px; padding:2px 7px;}
  .badge.b-team{color:var(--amber); border-color:rgba(232,180,102,.4);}
  .date{font-family:"Courier New",monospace; font-size:8.5px; letter-spacing:.15em; color:var(--smoke);}
  .del{background:none; border:none; color:var(--line); font-size:16px; cursor:pointer;
    padding:2px 4px; line-height:1; transition:.25s; flex:0 0 auto;}
  .del:hover{color:var(--amber);}
  .empty{border:1px dashed var(--line); border-radius:3px; padding:40px 16px; text-align:center;
    color:var(--smoke); font-style:italic; font-size:13px;}

  .foot{margin-top:26px; text-align:center; font-family:"Courier New",monospace;
    font-size:9px; letter-spacing:.28em; color:var(--smoke); line-height:2;}
  .foot b{color:var(--amber-dim); font-weight:400;}
  @media (max-width:480px){ .tabs{gap:5px;} .tab{padding:5px 10px;} }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="wrap">
  <header>
    <a class="back" href="index.html">← PRESENCE HUB</a>
    <div class="kicker mono">REEL 02 — ACTION PLAN</div>
    <h1>해야 할 일들, <em>frame by frame</em></h1>
    <div class="sub">쓰고, 지우고, 달성을 체크한다 — AOP LIM JAE YOUNG</div>
  </header>

  <div class="progress">
    <div class="p-top">
      <span class="p-label">ACHIEVEMENT</span>
      <span class="p-num" id="pNum">0 / 0</span>
    </div>
    <div class="bar"><div class="bar-fill" id="pFill"></div></div>
  </div>

  <div class="add">
    <input type="text" id="newText" placeholder="새 액션플랜을 입력하세요" maxlength="160">
    <select id="newCat">
      <option value="team">TEAM · 팀 운영</option>
      <option value="field">FIELD · 현장</option>
      <option value="wepair">WEPAIR · 위페어</option>
      <option value="present">TALK · 발표·자료</option>
      <option value="edu">EDU · 교육</option>
      <option value="recruit">RECRUIT · 리쿠르팅</option>
      <option value="etc">ETC · 기타</option>
    </select>
    <button id="addBtn">+ ADD</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="list" id="list"></div>

  <div class="foot">
    PRESENCE FIELD TEAM · <b>OXFAM × WEPAIR</b> · INCHEON, KR<br>
    체크·추가·삭제는 이 기기에 저장됩니다
  </div>
</div>

<script>
(function(){
  var LS_KEY='presence-actionplan-v1';
  var SEED_KEY='presence-actionplan-seed-v1';

  // ── 여기에 새 액션플랜을 추가하면 방문 시 자동으로 목록에 합쳐집니다 (id는 중복 금지) ──
  var SEED=[
    { id:'s-260704-1', cat:'team', text:'팀미팅 로테이션 운영: 재영 → 채영 → 윤경 → 예진 → 승학 순으로 월 1회 미팅 기회 주기. 순서 미리 공유하고, 담당자가 목표를 갖고 미팅을 어떻게 꾸려갈지 준비하도록 돕기' },
    { id:'s-260704-2', cat:'team', text:'팀 목표 중간 점검: 수요일쯤 목표 달성률 공유 → 남은 목표 달성을 위한 액션 제안 → 미달성 시 이유 피드백 → 기준을 가지고 다음 목표 제시' },
    { id:'s-260704-3', cat:'team', text:'팀원이 주관을 갖고 팀을 직접 운영해보는 경험 제공 + 운영 후 피드백과 성찰을 감정적이지 않게 하도록 돕기' },
    { id:'s-260704-4', cat:'team', text:'성과 공유 방식 만들기: 첫 세일즈·첫 프로모션·첫 트립·첫 컴페티션 위닝 등 "우리는 할 수 있는 팀"임을 보여주는 성과 공유 양식/프로그램 기획하기' },
    { id:'s-260704-5', cat:'team', text:'팀 문화 형성: 우리 팀의 문화가 무엇인지 정돈하고, 추구하는 문화를 모아 팀원들과 함께 이야기하는 시간을 어떻게 만들지 기획하기' }
  ];

  var CATS={
    team:   {label:'TEAM',    cls:'b-team'},
    field:  {label:'FIELD',   cls:''},
    wepair: {label:'WEPAIR',  cls:''},
    present:{label:'TALK',    cls:''},
    edu:    {label:'EDU',     cls:''},
    recruit:{label:'RECRUIT', cls:''},
    etc:    {label:'ETC',     cls:''}
  };

  var filter=localStorage.getItem('presence-actionplan-filter')||'all';

  function load(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return [];} }
  function save(a){ localStorage.setItem(LS_KEY, JSON.stringify(a)); }

  function mergeSeed(items){
    var applied=[];
    try{applied=JSON.parse(localStorage.getItem(SEED_KEY))||[];}catch(e){}
    var changed=false;
    SEED.forEach(function(s){
      if(applied.indexOf(s.id)===-1){
        items.push({id:s.id, text:s.text, cat:s.cat, done:false, ts:Date.now()});
        applied.push(s.id); changed=true;
      }
    });
    if(changed){ localStorage.setItem(SEED_KEY, JSON.stringify(applied)); save(items); }
    return items;
  }

  var items=mergeSeed(load());

  function fmt(ts){ var d=new Date(ts); return (d.getFullYear()%100)+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0'); }

  function render(){
    var tabsEl=document.getElementById('tabs');
    tabsEl.innerHTML='';
    var defs=[['all','ALL']].concat(Object.keys(CATS).map(function(k){return [k,CATS[k].label];}));
    defs.forEach(function(d){
      var b=document.createElement('button');
      b.className='tab'+(filter===d[0]?' active':'');
      b.textContent=d[1];
      b.onclick=function(){ filter=d[0]; localStorage.setItem('presence-actionplan-filter',filter); render(); };
      tabsEl.appendChild(b);
    });

    var total=items.length, done=items.filter(function(i){return i.done;}).length;
    document.getElementById('pNum').textContent=done+' / '+total;
    document.getElementById('pFill').style.width=(total?Math.round(done/total*100):0)+'%';

    var listEl=document.getElementById('list');
    listEl.innerHTML='';
    var view=items.filter(function(i){return filter==='all'||i.cat===filter;});
    view.sort(function(a,b){ if(a.done!==b.done)return a.done?1:-1; return b.ts-a.ts; });

    if(!view.length){
      var e=document.createElement('div');
      e.className='empty';
      e.textContent='아직 이 릴에는 프레임이 없습니다 — 위에서 추가하세요.';
      listEl.appendChild(e);
      return;
    }

    view.forEach(function(it){
      var cat=CATS[it.cat]||CATS.etc;
      var row=document.createElement('div'); row.className='item'+(it.done?' done':'');

      var chk=document.createElement('button'); chk.className='chk';
      chk.textContent=it.done?'✓':''; chk.title=it.done?'미완료로 되돌리기':'달성 체크';
      chk.onclick=function(){ it.done=!it.done; save(items); render(); };

      var body=document.createElement('div'); body.className='body';
      var t=document.createElement('div'); t.className='text'; t.textContent=it.text;
      var meta=document.createElement('div'); meta.className='meta';
      var badge=document.createElement('span'); badge.className='badge '+cat.cls; badge.textContent=cat.label;
      var date=document.createElement('span'); date.className='date'; date.textContent=fmt(it.ts);
      meta.appendChild(badge); meta.appendChild(date);
      body.appendChild(t); body.appendChild(meta);

      var del=document.createElement('button'); del.className='del'; del.innerHTML='&times;'; del.title='삭제';
      del.onclick=function(){ items=items.filter(function(x){return x.id!==it.id;}); save(items); render(); };

      row.appendChild(chk); row.appendChild(body); row.appendChild(del);
      listEl.appendChild(row);
    });
  }

  function addItem(){
    var input=document.getElementById('newText');
    var text=input.value.trim();
    if(!text)return;
    items.push({id:'u-'+Date.now(), text:text, cat:document.getElementById('newCat').value, done:false, ts:Date.now()});
    save(items); input.value=''; render();
  }
  document.getElementById('addBtn').onclick=addItem;
  document.getElementById('newText').addEventListener('keydown',function(e){ if(e.key==='Enter')addItem(); });

  render();
})();
</script>

<!-- PRESENCE THEME TOGGLE -->
<style id="pth-style">
html.pth-light{filter:invert(1) hue-rotate(180deg);background:#efe9db}
html.pth-light img,html.pth-light video,html.pth-light iframe,html.pth-light svg.emblem,html.pth-light .mat-logo svg{filter:invert(1) hue-rotate(180deg)}
html.pth-light .vignette,html.pth-light .grain,html.pth-light .beam{display:none!important}
#pth-btn{position:fixed;right:18px;bottom:18px;z-index:99999;width:46px;height:46px;border-radius:50%;border:1px solid rgba(150,140,120,.5);cursor:pointer;font-size:19px;line-height:1;background:rgba(22,20,15,.85);color:#efe7d6;box-shadow:0 4px 18px rgba(0,0,0,.4);transition:.25s}
#pth-btn:hover{transform:scale(1.1)}
html.pth-light #pth-btn{filter:invert(1) hue-rotate(180deg)}
</style>
<button id="pth-btn" title="라이트 / 나이트 모드" aria-label="테마 전환">☀</button>
<script>
(function(){var K="presence_theme",b=document.getElementById("pth-btn"),h=document.documentElement;
function ap(t){h.classList.toggle("pth-light",t==="light");b.textContent=t==="light"?"☾":"☀";}
var t="night";try{t=localStorage.getItem(K)||"night"}catch(e){}ap(t);
b.addEventListener("click",function(){t=(t==="light")?"night":"light";try{localStorage.setItem(K,t)}catch(e){}ap(t);});})();
</script>
</body>
</html>
